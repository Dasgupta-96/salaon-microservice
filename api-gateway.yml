server:
  port: 5003

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/user/**

        - id: salon-service
          uri: lb://SALON-SERVICE
          predicates:
            - Path=/api/salon/**
eureka:
  instance:
    prefer-ip-address: true
    
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
